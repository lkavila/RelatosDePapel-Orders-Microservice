server:
  port: ${PORT:8081}
spring:
  application:
    name: ${RAILWAY_PRIVATE_DOMAIN:orders}

  ## RabbitMQ Configuration
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:admin}
    password: ${RABBITMQ_PASSWORD:Admin123*}
    virtual-host: ${RABBITMQ_VHOST:/}

  ## Database Configuration
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3309/orders}
    driver-class-name: ${DB_DRIVER:com.mysql.cj.jdbc.Driver}
    username: ${SPRING_DATASOURCE_USERNAME:orders_user}
    password: ${SPRING_DATASOURCE_PASSWORD:orders_pass}
  sql:
    init:
      mode: always
      continue-on-error: true
      schema-locations: classpath:db/1-schema.sql
      data-locations: classpath:db/2-mock-data.sql
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: validate
    database-platform: org.hibernate.dialect.MySQLDialect
    properties:
      hibernate:
        format_sql: true

## Logging Configuration
logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    org.springframework.data.jpa: DEBUG

## Eureka Client Configuration
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka}
  instance:
    preferIpAddress: false
    hostname: ${RAILWAY_PRIVATE_DOMAIN:localhost}

## Microservices Configuration
catalog:
  url: ${CATALOG_URL:http://catalog/api/v1}


rabbitmq:
  exchange:
    orders: pedidos.creados
  routing:
    key:
      order:
        created: pedido.creado.key

jwt:
  secret: ${JWT_SECRET:mysecretkeyasdas324235dsfe-ds[ds[*dsf34-2okjfd89g}
